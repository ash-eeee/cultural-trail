<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <!-- map API link -->
        <link rel = "stylesheet" href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
        <script src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <!-- Font link from Google -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap">
        <title>Taiwan Cultural Trail</title>
        <style>
            /*define all the colors*/
            :root{
                --brick-red:    #8e0302;
                --brick-light:  #b03b2a;
                --paper-white:  #f5f0e8;
                --beige:        #d6b19b;
                --whale-blue:   #024b57;
                --deep-orange:  #c05a04;
                --seafoam:      #477273;
                --amber:        #a56249;
                --ink:          #1e1a16;
                --stamp-gold:   #c9943a;
                --stamp-shadow: rgba(0,0,0,0.18);

                /*night mode overrides (toggled via .night class on body)*/
                --bg:           var(--paper-white);
                --sidebar-bg:   var(--white-blue);
                --panel-bg:     #fff8f0;
                --text:         var(--ink);
                --header-bg:    var(--brick-red);
            }
            body.night{
                --bg:#12171a;
                --sidebar-bg:#0a1f25;
                --panel-bg:#1a2830;
                --text:
            }

            /* ── Reset / Base ── */
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            body{
                font-family: "Times New Roman", serif;
                background-color: var(--bg);
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                transition: background-color 0.5s, color 0.5s;
            }
            header{
                background-color: var(--header-bg);
                color: var(--paper-white);
                padding: 0.6rem 1.6rem;

                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;/*when window shrink, element doesn't shrink*/

                border-bottom:3px solid var(--stamp-gold);
                transition: background-color 0.5s;
            }
            h1{
                font-size: 50px;
            }
            p{
                font-size: 18px;
            }
            .filter-btn{
                color: var(--deep-orange);
                background-color: var(--belge);
            }
            /*sidebar*/
            #sidebar{
                background: var(--whale-blue);
                padding: 20px;
                width: 250px;
                color: var(--paper-white);
            }
            .tab-btn{
                font-family: "Times New Roman", serif;
                font-size: 20px;
                background-color: var(--seafoam-blue);
                color: var(--paper-white);
                width: 200px;
                height: 40px;
            }
            /*filter*/
            /*photo storage*/
            /*map*/
        </style>
    </head>
    <body>
        
        <!-- Start Page -->
            <!-- Login -->
            
        <!-- Header -->
        <header>
            <div class="header-left">
                <h1>Taiwan Cultural Trails</h1>
                <div class="header-sub">Explore historical sites &amp; local artisans across Taiwan</div>
            </div>
            <div class="header-right">
                <span class="header-user" id="header-user"></span>
                <label class="theme-toggle" id="themeToggle" title="Day/Night">
                    ☀︎
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                        ☾
                    </div>
                </label>
            </div>
        </header>
        <!-- Tool Bar -->
        <div class="tool-bar">
            <button class="tool-btn active" onclick="switchTab('map',this)">Explore Map</button>
            <button class="tool-btn"        onclick="switchTab('stamps',this)">Stamp Collection</button>
            <button class="tool-btn"        onclick="switchTab('memory')">Memory Photos</button>
        </div>
            <!-- Map page -->
            <div class="map-layout">

                <!-- Map -->
                 <div class="map-container">
                    <div id="map"></div>
                    <div id="api-status"></div>
                 </div>

                <!-- Sidebar -->
                <div id="sidebar" class="collapsed">
                    
                    <!-- Search -->
                    <div class="sidebar-section">
                        <h3>⌕ Search</h3>
                        <!--透明框框搜尋欄（可以輸入的）-->
                        <div class="search-wrap">
                            <span class="search-icon">⌕</span>
                            <input type="text" id="searchInput" placeholder="Search location, brand...">
                        </div>
                    </div>

                    <!-- Filter -->
                    <div class="sidebar-section">
                        <h3>Filter by Category</h3>
                        <div class="filter" id="Filter">

                            <label class="filter-item">
                                <input type="checkbox" value="Historical Sites" checked onchange="applyFilter()">
                                <div class="filter-box"></div>
                                Historical Building
                                <span class="filter-status" style="background:#c05a04"></span>
                            </label>

                            <label class="filter-item">
                                <input type="checkbox" value="Cretive Markets" onchange="applyFilter()">
                                <div class="filter-box"></div>
                                Creative Market
                                <span class="filter-status" style="background:#c05a04"></span>
                            </label>

                            <label class="filter-item">
                                <input type="checkbox" value="Craft Shops" onchange="applyFilter()">
                                <div class="filter-box"></div>
                                Local Craft Shop
                                <span class="filter-status" style="background:#c05a04"></span>
                            </label>

                            <label class="filter-item">
                                <input type="checkbox" value="Cultural Center" onchange="applyFilter()">
                                <div class="filter-box"></div>
                                Cultural Center
                                <span class="filter-status" style="background:#c05a04"></span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- Location Shown -->
                    <div class="sidebar-section" style="padding-bottom:0.4rem; border-bottom:none;">
                        <h3>Locations</h3>
                    </div>
                    <!-- loading -->
                    <div class="location-list" id="locationList">
                        <div class="loc-loading">Loading cultural sites...</div>
                    </div>
                </div>

                <!-- Info panel-->
                <div class="info-panel">
                    <div class="panel-header">
                        <div class="panel-tag" id="panelTag">Category</div>
                        <h2 id="panelTitle">Location Name</h2>
                        <button class="panel-close" onclick="closePanel()">x</button>
                    </div>
                    <div class="panel-body">
                        <p id="panelDesc">Description...</p>
                        <div class="panel-addr" id="panelAddr"></div>
                    </div>
                    <div class="panel-links" id="panelLinks"></div>
                </div>

            </div>
            
            <!-- Stamp Page -->
            <div class="stamp-page"></div>
            <!-- Photo Upload -->
            <div class="photo-page"></div>
        <script>
            //open first panel by default
            selectLocation(0);
        </script>
    </body>
</html>
